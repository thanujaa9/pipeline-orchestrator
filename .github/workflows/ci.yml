name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'   # Node 22 LTS — stable and supported

      - name: Install dependencies
        run: npm install

      - name: TypeScript build check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test